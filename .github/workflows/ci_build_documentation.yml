name: build_documentation

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Configure Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Install gaiasupdate
      run: pip install -e .
      
    - name: Install Sphinx and its dependencies
      run: pip install sphinx sphinx_pyproject sphinx_rtd_theme tomli
      
    - name: Build HTML
      run: sphinx-build docs/source build
      
    - name: Deploy HTML to gh-pages branch
      uses: peaceiris/actions-gh-pages@v3
      with:
         github_token: ${{ secrets.GITHUB_TOKEN }}
         publish_dir: build
         publish_branch: gh-pages
